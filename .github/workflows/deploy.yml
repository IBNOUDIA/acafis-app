name: Deploy Backend to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            cd /home/ec2-user
            curl -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -L https://api.github.com/repos/IBNOUDIA/acafis-app/tarball/main \
              -o /tmp/acafis.tar.gz
            tar -xzf /tmp/acafis.tar.gz -C /tmp/
            cp -r /tmp/IBNOUDIA-acafis-app-*/acafis-backend/acafis-app/backend/routes /home/ec2-user/backend/
            cp -r /tmp/IBNOUDIA-acafis-app-*/acafis-backend/acafis-app/backend/services /home/ec2-user/backend/
            cp -r /tmp/IBNOUDIA-acafis-app-*/acafis-backend/acafis-app/backend/models /home/ec2-user/backend/
            cp -r /tmp/IBNOUDIA-acafis-app-*/acafis-backend/acafis-app/backend/controllers /home/ec2-user/backend/
            cp /tmp/IBNOUDIA-acafis-app-*/acafis-backend/acafis-app/backend/server.js /home/ec2-user/backend/
            cd /home/ec2-user/backend && npm install --production
            pm2 restart acafis-backend
            rm -rf /tmp/acafis.tar.gz /tmp/IBNOUDIA-acafis-app-*/
            echo "✅ Déploiement réussi !"