name: Deploy Backend to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/backend
            git clone https://github.com/IBNOUDIA/acafis-app.git /tmp/acafis-tmp || true
            cp -r /tmp/acafis-tmp/acafis-backend/acafis-app/backend/routes /home/ec2-user/backend/
            cp -r /tmp/acafis-tmp/acafis-backend/acafis-app/backend/services /home/ec2-user/backend/
            cp -r /tmp/acafis-tmp/acafis-backend/acafis-app/backend/models /home/ec2-user/backend/
            cp -r /tmp/acafis-tmp/acafis-backend/acafis-app/backend/controllers /home/ec2-user/backend/
            cp /tmp/acafis-tmp/acafis-backend/acafis-app/backend/server.js /home/ec2-user/backend/
            cp /tmp/acafis-tmp/acafis-backend/acafis-app/backend/package.json /home/ec2-user/backend/
            npm install --production --prefix /home/ec2-user/backend
            pm2 restart acafis-backend
            rm -rf /tmp/acafis-tmp
            echo "✅ Déploiement réussi !"